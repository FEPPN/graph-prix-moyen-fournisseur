<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Graphique Prix Fournisseur</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Conteneur aligné tout à droite */
        .wrapper-infobulle {
            margin-top: 10px;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: flex-end; /* Pousse l'élément à droite */
            padding-right: 15px; /* Petite marge pour ne pas coller au bord */
        }
        
        /* Style du bouton très discret */
        .infobulle {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #95a5a6; /* Gris clair discret */
            font-size: 11px; /* Plus petit */
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .infobulle:hover {
            color: #7f8c8d; /* Gris un peu plus foncé au survol */
        }
        
        /* La bulle noire d'explication */
        .infobulle .texte-bulle {
            visibility: hidden;
            width: 240px; /* Plus étroite */
            background-color: rgba(44, 62, 80, 0.95); /* Très légère transparence */
            color: #ffffff;
            text-align: left; /* Aligné à gauche pour une lecture plus pro */
            border-radius: 6px;
            padding: 10px;
            font-size: 11px;
            line-height: 1.3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            
            /* Fixation de la bulle alignée sur la droite */
            position: absolute;
            z-index: 10;
            bottom: 160%;
            right: 0; /* S'aligne sur le bord droit du bouton */
            
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }
        
        /* La petite flèche sous la bulle (décalée à droite) */
        .infobulle .texte-bulle::after {
            content: "";
            position: absolute;
            top: 100%;
            right: 25px; /* Flèche positionnée à droite pour correspondre au bouton */
            border-width: 5px;
            border-style: solid;
            border-color: rgba(44, 62, 80, 0.95) transparent transparent transparent;
        }
        
        /* Affichage au survol */
        .infobulle:hover .texte-bulle {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div style="width: 100%; max-width: 800px; margin: 20px auto; text-align: center; font-family: Arial, sans-serif;">
        
        <h2 id="titreGraphique" style="font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 5px;">
            Évolution des prix
        </h2>

        <p style="color: #7f8c8d; font-size: 14px; margin-top: 0px; margin-bottom: 15px;">
            💡 Ce graphique est mis à jour automatiquement chaque 1er du mois
        </p>
        
        <div style="height: 350px;">
            <canvas id="monGraphique"></canvas>
        </div>

        <div class="wrapper-infobulle">
            <div class="infobulle">
                <span>Comprendre le calcul</span>
                <span style="background: #f0f3f4; width: 15px; height: 15px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 10px;">?</span>
                <span class="texte-bulle">
                    Les tarifs indiqués représentent la moyenne TTC des offres du fournisseur pour un particulier avec un compteur 6 kVA (option Base). Les données sont issues du médiateur de l'énergie.
                </span>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
