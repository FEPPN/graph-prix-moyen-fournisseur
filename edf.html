<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Graphique Prix Fournisseur</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div style="width: 100%; max-width: 800px; margin: 30px auto; text-align: center; font-family: Arial, sans-serif;">
        
        <h2 id="titreGraphique" style="size: 18px; weight: bold; color: #2c3e50; margin-bottom: 5px;">
            Évolution des prix
        </h2>

        <p style="color: #7f8c8d; font-size: 14px; margin-top: 0px; margin-bottom: 20px;">
            💡 Ce graphique est mis à jour automatiquement chaque 1er du mois
        </p>
        
        <div style="height: 450px;">
            <canvas id="monGraphique"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
